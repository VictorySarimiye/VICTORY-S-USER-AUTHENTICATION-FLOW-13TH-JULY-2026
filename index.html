<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VICTORY'S USER AUTHENTICATION FLOW</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    
    <div class="container">
        <h2>Sign In</h2>
        
        <div id="error-alert" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required placeholder="Min 9 characters">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Min 6 characters">
            </div>
            <button type="submit">Submit</button>
        </form>
    </div>




    <script src="sign-in.js"></script>
</body>
</html>
